  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const isVideo = document.getElementById('video');
    const videoSrc = 'video/hls/master.m3u8';

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(isVideo);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        isVideo.play();
      });
    } else if (isVideo.canPlayType('application/vnd.apple.mpegurl')) {
      isVideo.src = videoSrc;
      isVideo.addEventListener('loadedmetadata', () => isVideo.play());
    } else {
      isVideo.src = 'video/video.ogg'; // fallback OGG
    }
  </script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
